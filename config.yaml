project:
  name: "Music Mood Mining India"
  prn: "PASTE_YOUR_PRN"
  author: "PASTE_YOUR_NAME"

spotify_api:
  client_id: "PASTE_YOUR_CLIENT_ID"
  client_secret: "PASTE_YOUR_CLIENT_SECRET"

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  warehouse: "data/warehouse/music_warehouse.db"
